<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <script src="https://cdn.tailwindcss.com"></script>
 
  <title>Frontend Mentor | QR code component</title>

  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <body class="min-h-screen flex items-center justify-center bg-slate-200 px-6">
  <main
    class="w-full max-w-xs rounded-2xl bg-white p-4 shadow-xl
           sm:max-w-sm md:max-w-md lg:max-w-sm"
  >
    <img
      src="./images/image-qr-code.png"
      alt="QR Code"
      class="w-full rounded-xl"
    />

    <div class="px-2 pt-6 pb-4 text-center">
      <h1
        class="text-xl font-bold leading-7 text-slate-900
               sm:text-2xl"
      >
        Improve your front-end skills by building projects
      </h1>

      <p
        class="mt-4 text-[15px] leading-6 text-slate-500
               sm:text-base"
      >
        Scan the QR code to visit Frontend Mentor and take your coding skills to
        the next level.
      </p>
    </div>
  </main>
</body>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Justin Woods</a>.
  </footer>
</body>
</html>
