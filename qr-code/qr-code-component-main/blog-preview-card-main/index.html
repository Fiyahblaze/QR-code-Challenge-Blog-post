<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Frontend Mentor | Blog preview card</title>
  </head>
  <body class="bg-yellow-300 flex items-center justify-center min-h-screen">
    <main class="bg-white w-80 p-5 rounded-2xl border-2 border-black shadow-[8px_8px_0px_black]">
      <img
        src="./assets/images/illustration-article.svg"
        alt="Article"
        class="rounded-xl"
      />

      <button class="bg-yellow-300 px-3 py-1 rounded font-bold text-sm mt-5">
        Learning
      </button>

      <p class="text-sm mt-3">Published 21 Dec 2023</p>

      <h1 class="font-extrabold text-2xl mt-3 hover:text-yellow-300 cursor-pointer">
        HTML & CSS foundations
      </h1>

      <p class="text-gray-500 mt-3 text-sm leading-6">
        These languages are the backbone of every website, defining structure,
        content, and presentation.
      </p>

      <div class="flex items-center mt-6">
        <img
          src="./assets/images/image-avatar.webp"
          alt="Greg Hooper"
          class="w-8 h-8"
        />
        <p class="font-bold ml-3">Greg Hooper</p>
      </div>
    </main>
  </body>
</html>
